<aside class="sidebar">
  <div class="sidebar__top">
    <div class="sidebar__brand">
      <div class="sidebar__logo">
        <img src="/images/brand.png" alt="TallerMotosApp logo">
      </div>

      <div class="sidebar__brand-text">
        <h2>{{ userName || 'Usuario' }}</h2>
        <span>{{ rolUser }}</span>
      </div>
    </div>

    <nav class="sidebar__nav">
      <a class="sidebar__item" routerLink="/dashboard" routerLinkActive="sidebar__item--active"
        [routerLinkActiveOptions]="{ exact: true }">
        <span class="sidebar__icon">🏠</span>
        <span>Dashboard</span>
      </a>

      <a class="sidebar__item" routerLink="/dashboard/customers" routerLinkActive="sidebar__item--active">
        <span class="sidebar__icon">👥</span>
        <span>Clientes</span>
      </a>

      <a class="sidebar__item" href="#">
        <span class="sidebar__icon">🏍️</span>
        <span>Motos</span>
      </a>

      <a class="sidebar__item" href="#">
        <span class="sidebar__icon">🛠️</span>
        <span>Servicios</span>
      </a>

      <a class="sidebar__item" href="#">
        <span class="sidebar__icon">📅</span>
        <span>Recordatorios</span>
      </a>

      <a class="sidebar__item" href="#">
        <span class="sidebar__icon">⚙️</span>
        <span>Configuración</span>
      </a>
    </nav>
  </div>

  <div class="sidebar__bottom">
    <button class="sidebar__logout" type="button" (click)="openLogoutModal()">
      <span>↩</span>
      <span>Cerrar sesión</span>
    </button>
  </div>
</aside>
<div class="logout-modal-backdrop" *ngIf="showLogoutModal" (click)="closeLogoutModal()">
  <div class="logout-modal" (click)="$event.stopPropagation()">
    <div class="logout-modal__icon">🔒</div>

    <h3>¿Cerrar sesión?</h3>
    <p>
      Estás a punto de salir de tu sesión actual en TallerMotosApp.
    </p>

    <div class="logout-modal__actions">
      <button type="button" class="btn-cancel" (click)="closeLogoutModal()">
        Cancelar
      </button>

      <button type="button" class="btn-confirm" (click)="confirmLogout()">
        Sí, cerrar sesión
      </button>
    </div>
  </div>
</div>
